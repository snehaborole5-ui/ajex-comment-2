<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AJAX Comments CRUD</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Loading Spinner Center karnyasathi CSS */
        #spinner {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background-color: rgba(255, 255, 255, 0.7);
            z-index: 9999;
        }
    </style>
</head>
<body class="bg-light">

    

    <div class="container mt-5">
        <div class="row mb-5 justify-content-center">
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-body">
                        <h2 class="text-center mb-4">Manage Comments</h2>
                        <form id="commentForm">
                            <div class="mb-3">
                                <label for="commentName" class="form-label fw-bold">Comment Name*</label>
                                <input type="text" class="form-control" id="commentName" required placeholder="Enter comment heading">
                            </div>
                            <div class="mb-3">
                                <label for="commentEmail" class="form-label fw-bold">User Email*</label>
                                <input type="email" class="form-control" id="commentEmail" required placeholder="Enter email">
                            </div>
                            <div class="mb-3">
                                <label for="commentBody" class="form-label fw-bold">Comment Body*</label>
                                <textarea class="form-control" id="commentBody" rows="4" required placeholder="Write your comment here..."></textarea>
                            </div>
                            <div class="d-grid gap-2">
                                <button type="submit" id="addCommentBtn" class="btn btn-primary">Add Comment</button>
                                <button type="button" id="updateCommentBtn" class="btn btn-info text-white d-none">Update Comment</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <h3 class="mb-4">All Comments</h3>
        <hr>
        <div class="row" id="commentContainer">
            </div>
    </div>

    <div id="spinner" class="d-flex justify-content-center align-items-center d-none">
        <div class="spinner-border text-primary" role="status" style="width: 3rem; height: 3rem;">
            <span class="visually-hidden">Loading...</span>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="./assets/js/app.js"></script>
</body>
</html>
